<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kowri – Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
:root{--bg:#060e0a;--card:#0d1c14;--green:#22c55e;--green-dark:#16a34a;--text:#f0fdf4;--border:rgba(34,197,94,0.15);--radius:14px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:radial-gradient(ellipse 60% 60% at 20% 50%,rgba(34,197,94,0.12) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 80% 50%,rgba(22,163,74,0.07) 0%,transparent 55%),var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
.back-btn{padding:20px 32px;display:flex;align-items:center;gap:8px;font-size:14px;color:#9ca3af;cursor:pointer;background:none;border:none;transition:color .2s;font-family:'DM Sans',sans-serif;}
.back-btn:hover{color:var(--text);}
.center{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;}
.auth-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:44px;width:100%;max-width:480px;}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--green-dark),var(--green));border-radius:8px;display:flex;align-items:center;justify-content:center;}
.logo-text{font-family:'Sora',sans-serif;font-weight:800;font-size:18px;color:var(--green);}
h2{font-family:'Sora',sans-serif;font-size:26px;font-weight:800;margin-bottom:6px;}
.sub{font-size:14px;color:#9ca3af;margin-bottom:28px;}
.field{margin-bottom:18px;}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:7px;color:#d1fae5;}
.field input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s;font-family:'DM Sans',sans-serif;}
.field input::placeholder{color:#4b5563;}
.field input:focus{border-color:var(--green);}
.field input.input-error{border-color:rgba(239,68,68,0.6);}
.field-hint{font-size:11px;color:#ef4444;margin-top:5px;display:none;}
.field-hint.show{display:block;}
.pass-wrap{position:relative;}
.pass-wrap input{padding-right:44px;}
.pass-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#6b7280;font-size:15px;padding:0;line-height:1;transition:color .2s;}
.pass-toggle:hover{color:#9ca3af;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.btn-submit{width:100%;background:var(--green);color:#000;font-family:'Sora',sans-serif;font-weight:700;font-size:15px;padding:14px;border:none;border-radius:10px;cursor:pointer;transition:all .2s;margin-top:8px;}
.btn-submit:hover{background:#16a34a;transform:translateY(-1px);}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.foot{text-align:center;margin-top:18px;font-size:13px;color:#9ca3af;}
.foot a{color:var(--green);text-decoration:none;font-weight:600;}
.foot a:hover{text-decoration:underline;}
.banner{border-radius:10px;padding:13px 16px;font-size:13px;margin-bottom:18px;display:none;align-items:flex-start;gap:10px;line-height:1.5;}
.banner i{margin-top:1px;flex-shrink:0;font-size:14px;}
.banner-body strong{display:block;font-weight:600;margin-bottom:2px;font-size:13px;}
.banner-body span{color:inherit;opacity:.85;}
.error-banner{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.35);color:#fca5a5;}
.success-banner{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:#86efac;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:560px){
  .auth-box{padding:28px 20px;border-radius:16px;}
  .row{grid-template-columns:1fr;}
  .back-btn{padding:16px;}
}
</style>
</head>
<body>
<button class="back-btn" onclick="location.href='index.html'">
  <i class="fa-solid fa-arrow-left"></i> Back to Home
</button>
<div class="center">
  <div class="auth-box">
    <div class="logo-row">
      <div class="logo-icon"><i class="fa-solid fa-shield-halved" style="color:#fff;font-size:15px;"></i></div>
      <span class="logo-text">Kowri</span>
    </div>
    <h2>Create Account</h2>
    <div class="sub">Join Kowri and start earning rewards today</div>

    <div class="banner error-banner" id="err-box">
      <i class="fa-solid fa-circle-exclamation"></i>
      <div class="banner-body">
        <strong id="err-title">Something went wrong</strong>
        <span id="err-msg"></span>
      </div>
    </div>

    <div class="banner success-banner" id="suc-box">
      <i class="fa-solid fa-circle-check"></i>
      <div class="banner-body">
        <strong>Account created!</strong>
        <span>Redirecting you to your dashboard…</span>
      </div>
    </div>

    <div class="field">
      <label>Full Name</label>
      <input type="text" id="fullName" placeholder="John Doe"/>
      <div class="field-hint" id="hint-name">Please enter your full name</div>
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="john@example.com"/>
      <div class="field-hint" id="hint-email">Please enter a valid email address</div>
    </div>
    <div class="row">
      <div class="field">
        <label>Password</label>
        <div class="pass-wrap">
          <input type="password" id="password" placeholder="Min 6 characters"/>
          <button type="button" class="pass-toggle" onclick="togglePass('password', this)" tabindex="-1" aria-label="Show password">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
        <div class="field-hint" id="hint-password">Password must be at least 6 characters</div>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <div class="pass-wrap">
          <input type="password" id="confirmPassword" placeholder="Re-enter password"/>
          <button type="button" class="pass-toggle" onclick="togglePass('confirmPassword', this)" tabindex="-1" aria-label="Show password">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
        <div class="field-hint" id="hint-confirm">Passwords do not match</div>
      </div>
    </div>
    <button class="btn-submit" id="reg-btn" onclick="doRegister()">Create Account</button>
    <div class="foot">Already have an account? <a href="signin.html">Sign In</a></div>
  </div>
</div>

<script>
const API = 'https://kowriwebbackend.onrender.com';

// Generate a unique phone number for every registration.
// Format: +233 + 9 random digits. Uses timestamp + crypto random to avoid collisions.
function generateUniquePhone() {
  const ts = Date.now().toString().slice(-6); // last 6 digits of timestamp
  const rand = Math.floor(Math.random() * 1000).toString().padStart(3, '0'); // 3 random digits
  return '+233' + ts + rand; // +233 + 9 digits = valid-looking unique number
}

function togglePass(inputId, btn) {
  const input = document.getElementById(inputId);
  const icon = btn.querySelector('i');
  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.replace('fa-eye', 'fa-eye-slash');
    btn.setAttribute('aria-label', 'Hide password');
  } else {
    input.type = 'password';
    icon.classList.replace('fa-eye-slash', 'fa-eye');
    btn.setAttribute('aria-label', 'Show password');
  }
}

function clearErrors() {
  document.getElementById('err-box').style.display = 'none';
  ['fullName','email','password','confirmPassword'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('input-error');
  });
  document.querySelectorAll('.field-hint').forEach(h => h.classList.remove('show'));
}

function fieldError(inputId, hintId) {
  const el = document.getElementById(inputId);
  if (el) el.classList.add('input-error');
  const hint = document.getElementById(hintId);
  if (hint) hint.classList.add('show');
}

function showBanner(title, msg) {
  document.getElementById('err-title').textContent = title;
  document.getElementById('err-msg').textContent = msg;
  const box = document.getElementById('err-box');
  box.style.display = 'flex';
  box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function friendlyError(rawMsg) {
  const m = (rawMsg || '').toLowerCase();
  if (m.includes('email') && (m.includes('exist') || m.includes('taken') || m.includes('already') || m.includes('registered')))
    return { title: 'Email already in use', msg: 'An account with this email already exists. Try signing in instead.' };
  if (m.includes('phone') && (m.includes('exist') || m.includes('taken') || m.includes('already')))
    return { title: 'Registration error', msg: 'Please try again.' };
  if (m.includes('password') && m.includes('weak'))
    return { title: 'Password too weak', msg: 'Choose a stronger password with letters, numbers, and symbols.' };
  if (m.includes('invalid email') || m.includes('email format'))
    return { title: 'Invalid email', msg: 'Please enter a valid email address like name@example.com.' };
  if (m.includes('network') || m.includes('fetch') || m.includes('failed to fetch'))
    return { title: 'No internet connection', msg: 'Check your connection and try again.' };
  if (m.includes('server') || m.includes('500') || m.includes('internal'))
    return { title: 'Server error', msg: 'Something went wrong on our end. Please try again in a moment.' };
  return { title: 'Registration failed', msg: rawMsg || 'Please check your details and try again.' };
}

async function doRegister() {
  const btn = document.getElementById('reg-btn');
  clearErrors();

  const fullName        = document.getElementById('fullName').value.trim();
  const email           = document.getElementById('email').value.trim();
  const password        = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  let hasError = false;
  if (!fullName)        { fieldError('fullName', 'hint-name');     hasError = true; }
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))
                        { fieldError('email', 'hint-email');       hasError = true; }
  if (!password || password.length < 6)
                        { fieldError('password', 'hint-password'); hasError = true; }
  if (password !== confirmPassword)
                        { fieldError('confirmPassword', 'hint-confirm'); hasError = true; }

  if (hasError) {
    showBanner('Please fix the errors below', 'Fill in all highlighted fields correctly before continuing.');
    return;
  }

  // Auto-generate a unique phone number — not shown to user
  const phoneNumber = generateUniquePhone();

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Creating Account…';

  try {
    const res = await fetch(`${API}/api/users/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fullName, email, password, confirmPassword, phoneNumber })
    });

    let data = {};
    try { data = await res.json(); } catch(_) {}

    if (!res.ok) {
      const { title, msg } = friendlyError(data.message || data.error || `HTTP ${res.status}`);
      showBanner(title, msg);
      btn.disabled = false;
      btn.textContent = 'Create Account';
      return;
    }

    localStorage.setItem('kowri_token',   data.token);
    localStorage.setItem('kowri_refresh', data.refreshToken);
    localStorage.setItem('kowri_user',    JSON.stringify(data));

    document.getElementById('suc-box').style.display = 'flex';
    setTimeout(() => location.href = 'dashboard.html', 1800);

  } catch(e) {
    const { title, msg } = friendlyError(e.message);
    showBanner(title, msg);
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}

document.addEventListener('keydown', e => { if(e.key === 'Enter') doRegister(); });
</script>
</body>
</html>
