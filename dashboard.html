<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kowri – Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
:root{
  --green:#22c55e;
  --green-dark:#16a34a;
  --bg:#f9fafb;
  --card:#fff;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* NAV */
.dash-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 32px;
  background:#fff;border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;
}
.logo{display:flex;align-items:center;gap:9px;font-family:'Sora',sans-serif;font-weight:800;font-size:18px;color:var(--green);}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#16a34a,#22c55e);border-radius:7px;display:flex;align-items:center;justify-content:center;}
.nav-right{display:flex;align-items:center;gap:12px;}
.nav-user{font-size:14px;color:var(--muted);font-weight:500;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-logout{
  background:none;border:1px solid var(--border);
  border-radius:8px;padding:8px 16px;
  font-size:13px;font-weight:600;cursor:pointer;
  color:var(--muted);transition:all .2s;
  font-family:'DM Sans',sans-serif;
  white-space:nowrap;
}
.btn-logout:hover{border-color:#ef4444;color:#ef4444;}

/* BODY */
.body{padding:24px 32px;max-width:960px;margin:0 auto;}
.page-title{font-family:'Sora',sans-serif;font-size:24px;font-weight:800;margin-bottom:20px;}

/* SUMMARY CARDS */
.cards-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.sum-card .sc-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.sum-card .sc-label{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:6px;}
.sum-card .sc-val{font-family:'Sora',sans-serif;font-size:22px;font-weight:800;color:var(--text);}
.sum-card.balance .sc-icon{background:#dcfce7;}
.sum-card.balance .sc-val{color:var(--green);}
.sum-card.deposits .sc-icon{background:#dbeafe;}
.sum-card.deposits .sc-val{color:#1d4ed8;}
.sum-card.withdrawals .sc-icon{background:#fef3c7;}
.sum-card.withdrawals .sc-val{color:#d97706;}

/* ACTION BUTTONS */
.action-bar{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.btn-action{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:16px;border-radius:12px;
  font-family:'Sora',sans-serif;font-weight:700;font-size:15px;
  cursor:pointer;border:none;transition:all .2s;
  min-height:56px;
}
.btn-deposit{background:var(--green);color:#fff;}
.btn-deposit:hover{background:var(--green-dark);}
.btn-withdraw{background:#1d4ed8;color:#fff;}
.btn-withdraw:hover:not(:disabled){background:#1e40af;}
.btn-withdraw:disabled{opacity:.5;cursor:not-allowed;}

/* TX CARD */
.tx-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.tx-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px;border-bottom:1px solid var(--border);
  flex-wrap:wrap;gap:12px;
}
.tx-header h2{font-family:'Sora',sans-serif;font-size:16px;font-weight:700;}

/* TABS */
.tabs{display:flex;gap:4px;background:#f3f4f6;border-radius:8px;padding:3px;width:100%;}
.tab{
  flex:1;padding:9px 8px;border-radius:6px;
  font-size:13px;font-weight:600;cursor:pointer;
  border:none;background:none;color:var(--muted);
  transition:all .2s;font-family:'DM Sans',sans-serif;
  text-align:center;
}
.tab.active{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.08);}

/* TX LIST */
.tx-list{padding:8px 0;}
.tx-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
  border-bottom:1px solid #f3f4f6;
  gap:12px;
}
.tx-item:last-child{border-bottom:none;}
.tx-left{display:flex;align-items:center;gap:12px;}
.tx-icon{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:15px;
}
.tx-icon.dep{background:#dcfce7;color:#16a34a;}
.tx-icon.wit{background:#fef3c7;color:#d97706;}
.tx-info .tx-type{font-size:14px;font-weight:600;color:var(--text);}
.tx-info .tx-date{font-size:12px;color:var(--muted);margin-top:2px;}
.tx-right{text-align:right;flex-shrink:0;}
.tx-amount{font-family:'Sora',sans-serif;font-size:14px;font-weight:800;color:var(--text);}
.tx-status{margin-top:4px;}
.badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600;}
.badge.PENDING{background:#fef9c3;color:#854d0e;}
.badge.APPROVED{background:#dcfce7;color:#166534;}
.badge.REJECTED{background:#fee2e2;color:#991b1b;}
.empty{text-align:center;color:var(--muted);font-size:14px;padding:32px 20px;}
.loading{text-align:center;color:var(--muted);font-size:14px;padding:32px 20px;}

/* MOBILE */
@media(max-width:640px){
  .dash-nav{padding:12px 16px;}
  .nav-user{display:none;}
  .body{padding:16px;}
  .page-title{font-size:20px;margin-bottom:16px;}
  .cards-row{grid-template-columns:1fr;gap:10px;}
  .sum-card{padding:16px;display:flex;align-items:center;gap:14px;}
  .sum-card .sc-icon{margin-bottom:0;flex-shrink:0;}
  .sum-card .sc-val{font-size:20px;}
  .action-bar{gap:10px;}
  .btn-action{font-size:14px;padding:15px 10px;}
  .tx-header{padding:14px 16px;}
  .tx-item{padding:12px 16px;}
  .tx-icon{width:34px;height:34px;font-size:13px;}
}
@media(max-width:360px){
  .action-bar{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<nav class="dash-nav">
  <div class="logo">
    <div class="logo-icon"><i class="fa-solid fa-shield-halved" style="color:#fff;font-size:14px;"></i></div>
    Kowri
  </div>
  <div class="nav-right">
    <span class="nav-user" id="nav-name"></span>
    <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button>
  </div>
</nav>

<div class="body">
  <div class="page-title">Dashboard</div>

  <div class="cards-row">
    <div class="sum-card balance">
      <div class="sc-icon"><i class="fa-solid fa-wallet" style="color:#16a34a;font-size:17px;"></i></div>
      <div>
        <div class="sc-label">Total Balance</div>
        <div class="sc-val" id="bal-val">GH₵ 0.00</div>
      </div>
    </div>
    <div class="sum-card deposits">
      <div class="sc-icon"><i class="fa-solid fa-arrow-down" style="color:#1d4ed8;font-size:17px;"></i></div>
      <div>
        <div class="sc-label">Total Deposited</div>
        <div class="sc-val" id="dep-val">GH₵ 0.00</div>
      </div>
    </div>
    <div class="sum-card withdrawals">
      <div class="sc-icon"><i class="fa-solid fa-arrow-up" style="color:#d97706;font-size:17px;"></i></div>
      <div>
        <div class="sc-label">Total Withdrawn</div>
        <div class="sc-val" id="wit-val">GH₵ 0.00</div>
      </div>
    </div>
  </div>

  <div class="action-bar">
    <button class="btn-action btn-deposit" onclick="location.href='deposit.html'">
      <i class="fa-solid fa-arrow-down"></i> Make Deposit
    </button>
    <button id="withdraw-btn" class="btn-action btn-withdraw" onclick="goWithdraw()">
      <i class="fa-solid fa-arrow-up"></i> Withdraw
    </button>
  </div>

  <div class="tx-card">
    <div class="tx-header">
      <h2>Transaction History</h2>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('all',this)">All</button>
        <button class="tab" onclick="switchTab('deposits',this)">Deposits</button>
        <button class="tab" onclick="switchTab('withdrawals',this)">Withdrawals</button>
      </div>
    </div>
    <div id="tx-body"><div class="loading"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading...</div></div>
  </div>
</div>

<script>
const API = 'https://kowriwebbackend.onrender.com';
let userData       = null;
let allDeposits    = [];
let allWithdrawals = [];
let currentTab     = 'all';
let currentBalance = 0;

function logout() {
  localStorage.removeItem('kowri_token');
  localStorage.removeItem('kowri_user');
  localStorage.removeItem('kowri_refresh');
  location.href = 'signin.html';
}

// ✅ Guard: only navigate to withdraw if balance > 0
function goWithdraw() {
  if (currentBalance <= 0) return;
  location.href = 'withdraw.html';
}

function fmt(amt) { return 'GH₵ ' + parseFloat(amt || 0).toFixed(2); }
function fmtDate(d) { return new Date(d).toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}); }

function init() {
  const stored = localStorage.getItem('kowri_user');
  const token  = localStorage.getItem('kowri_token');
  if (!stored || !token) { location.href = 'signin.html'; return; }
  userData = JSON.parse(stored);
  document.getElementById('nav-name').textContent = userData.fullName || userData.email;
  loadData();
}

async function loadData() {
  const token  = localStorage.getItem('kowri_token');
  const userId = userData.userId || userData.id;
  const headers = { 'Authorization': `Bearer ${token}` };

  try {
    // ✅ Three parallel fetches: deposits, withdrawals, financial summary
    const [dRes, wRes, sumRes] = await Promise.all([
      fetch(`${API}/api/users/${userId}/deposits`,          { headers }),
      fetch(`${API}/api/users/${userId}/withdrawals`,       { headers }),
      fetch(`${API}/api/users/${userId}/financial-summary`, { headers })
    ]);

    allDeposits    = dRes.ok   ? (await dRes.json())   : [];
    allWithdrawals = wRes.ok   ? (await wRes.json())   : [];
    const summary  = sumRes.ok ? (await sumRes.json()) : null;

    // ✅ All three figures come from the server — no client-side math
    currentBalance = parseFloat(summary?.balance ?? 0);
    document.getElementById('bal-val').textContent = fmt(summary?.balance        ?? 0);
    document.getElementById('dep-val').textContent = fmt(summary?.totalDeposited ?? 0);
    document.getElementById('wit-val').textContent = fmt(summary?.totalWithdrawn ?? 0);

    // ✅ Disable withdraw button when balance is zero or negative
    const wBtn = document.getElementById('withdraw-btn');
    wBtn.disabled = currentBalance <= 0;
    wBtn.title    = currentBalance <= 0 ? 'Insufficient balance to withdraw' : '';

    renderList(currentTab);
  } catch(e) {
    document.getElementById('tx-body').innerHTML =
      '<div class="empty">Failed to load transactions.</div>';
  }
}

function switchTab(type, el) {
  currentTab = type;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderList(type);
}

function renderList(type) {
  const items = [];
  if (type === 'all' || type === 'deposits')
    allDeposits.forEach(d => items.push({...d, _type:'Deposit'}));
  if (type === 'all' || type === 'withdrawals')
    allWithdrawals.forEach(w => items.push({...w, _type:'Withdrawal'}));
  items.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  if (!items.length) {
    document.getElementById('tx-body').innerHTML =
      '<div class="empty">No transactions found.</div>';
    return;
  }

  const html = items.map(tx => {
    const isDep = tx._type === 'Deposit';
    return `<div class="tx-item">
      <div class="tx-left">
        <div class="tx-icon ${isDep ? 'dep' : 'wit'}">
          <i class="fa-solid fa-arrow-${isDep ? 'down' : 'up'}"></i>
        </div>
        <div class="tx-info">
          <div class="tx-type">${tx._type}</div>
          <div class="tx-date">${fmtDate(tx.createdAt)}</div>
        </div>
      </div>
      <div class="tx-right">
        <div class="tx-amount">${fmt(tx.amount)}</div>
        <div class="tx-status"><span class="badge ${tx.status}">${tx.status}</span></div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('tx-body').innerHTML = `<div class="tx-list">${html}</div>`;
}

init();
</script>
</body>
</html>
