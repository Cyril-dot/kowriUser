<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kowri – Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
:root{
  --green:#22c55e;--green-dark:#16a34a;--green-dim:#dcfce7;--green-border:rgba(34,197,94,0.2);
  --bg:#f9fafb;--sidebar:#fff;--card:#fff;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;}

/* SIDEBAR */
.sidebar{width:240px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s;}
.sb-logo{display:flex;align-items:center;gap:10px;padding:22px 20px;border-bottom:1px solid var(--border);}
.sb-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--green-dark),var(--green));border-radius:7px;display:flex;align-items:center;justify-content:center;}
.sb-logo-text{font-family:'Sora',sans-serif;font-weight:800;font-size:16px;color:var(--green);}
.sb-nav{padding:16px 10px;flex:1;}
.sb-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:9px;cursor:pointer;font-size:14px;font-weight:500;color:var(--muted);transition:all .2s;margin-bottom:3px;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif;}
.sb-item:hover{background:#f3f4f6;color:var(--text);}
.sb-item.active{background:var(--green-dim);color:var(--green-dark);}
.sb-item i{width:18px;text-align:center;font-size:15px;}
.sb-footer{padding:16px 10px;border-top:1px solid var(--border);}
.sb-admin{display:flex;align-items:center;gap:10px;padding:10px 12px;}
.sb-avatar{width:32px;height:32px;background:linear-gradient(135deg,var(--green-dark),var(--green));border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-weight:800;font-size:12px;color:#fff;}
.sb-name{font-size:13px;font-weight:600;color:var(--text);}
.btn-logout{width:100%;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.18);border-radius:8px;padding:9px;color:#ef4444;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;margin-top:8px;}
.btn-logout:hover{background:rgba(239,68,68,0.12);}

/* MAIN */
.main{margin-left:240px;flex:1;min-height:100vh;}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--card);position:sticky;top:0;z-index:50;}
.top-bar h1{font-family:'Sora',sans-serif;font-size:20px;font-weight:700;color:var(--text);}
.top-badge{background:var(--green-dim);border:1px solid var(--green-border);color:var(--green-dark);font-size:12px;font-weight:600;padding:5px 12px;border-radius:999px;}
.content{padding:28px;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.stat-card .sc-icon{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.stat-card .sc-val{font-family:'Sora',sans-serif;font-size:26px;font-weight:800;margin-bottom:4px;}
.stat-card .sc-label{font-size:13px;color:var(--muted);}
.stat-card.green .sc-icon{background:#dcfce7;}.stat-card.green .sc-val{color:var(--green-dark);}
.stat-card.yellow .sc-icon{background:#fef9c3;}.stat-card.yellow .sc-val{color:#a16207;}
.stat-card.red .sc-icon{background:#fee2e2;}.stat-card.red .sc-val{color:#dc2626;}
.stat-card.blue .sc-icon{background:#dbeafe;}.stat-card.blue .sc-val{color:#1d4ed8;}

/* TABS */
.section-tabs{display:flex;gap:4px;background:#f3f4f6;border-radius:10px;padding:4px;margin-bottom:20px;width:fit-content;}
.stab{padding:8px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--muted);transition:all .2s;font-family:'DM Sans',sans-serif;}
.stab.active{background:#fff;color:var(--green-dark);box-shadow:0 1px 4px rgba(0,0,0,0.08);}

/* TABLE CARD */
.table-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.table-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);}
.table-head h2{font-family:'Sora',sans-serif;font-size:16px;font-weight:700;color:var(--text);}
.search-box{display:flex;align-items:center;gap:8px;background:#f9fafb;border:1px solid var(--border);border-radius:8px;padding:8px 12px;}
.search-box input{background:none;border:none;color:var(--text);font-size:13px;outline:none;width:200px;font-family:'DM Sans',sans-serif;}
.search-box input::placeholder{color:#9ca3af;}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:11px;color:var(--muted);padding:12px 16px;background:#f9fafb;font-weight:600;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);}
td{padding:13px 16px;font-size:13px;border-top:1px solid #f3f4f6;color:var(--text);vertical-align:middle;}
tr:hover td{background:#fafafa;}

.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;}
.badge.PENDING{background:#fef9c3;color:#854d0e;}
.badge.APPROVED{background:#dcfce7;color:#166534;}
.badge.REJECTED{background:#fee2e2;color:#991b1b;}

.action-btns{display:flex;gap:6px;align-items:center;}
.btn-approve{background:#dcfce7;border:1px solid rgba(34,197,94,0.3);color:#166534;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-approve:hover{background:#bbf7d0;}
.btn-reject{background:#fee2e2;border:1px solid rgba(239,68,68,0.25);color:#991b1b;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-reject:hover{background:#fecaca;}
.btn-details{background:#f3f4f6;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-details:hover{background:#e5e7eb;}

.empty{text-align:center;color:var(--muted);font-size:14px;padding:36px 0;}
.loading{text-align:center;color:var(--muted);font-size:14px;padding:36px 0;}

/* OVERVIEW */
.recent-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.recent-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.recent-card h3{font-family:'Sora',sans-serif;font-size:15px;font-weight:700;margin-bottom:14px;}
.recent-card h3.green{color:var(--green-dark);}
.recent-card h3.blue{color:#1d4ed8;}
.recent-row{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #f3f4f6;cursor:pointer;transition:background .15s;border-radius:6px;padding:9px 6px;}
.recent-row:last-child{border-bottom:none;}
.recent-row:hover{background:#f9fafb;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 20px;font-size:14px;font-weight:600;z-index:999;transform:translateY(100px);opacity:0;transition:all .3s;box-shadow:0 4px 20px rgba(0,0,0,0.08);}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:rgba(34,197,94,0.4);color:#166534;}
.toast.error{border-color:rgba(239,68,68,0.3);color:#dc2626;}

/* ── DETAIL DRAWER ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;display:none;opacity:0;transition:opacity .25s;}
.drawer-overlay.open{display:block;opacity:1;}
.drawer{position:fixed;top:0;right:0;height:100vh;width:480px;max-width:100vw;background:#fff;z-index:201;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;display:flex;flex-direction:column;}
.drawer.open{transform:translateX(0);}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:10;}
.drawer-header h2{font-family:'Sora',sans-serif;font-size:18px;font-weight:800;}
.drawer-close{background:none;border:1px solid var(--border);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:16px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .2s;}
.drawer-close:hover{background:#f3f4f6;color:var(--text);}
.drawer-body{padding:24px;flex:1;}

/* Detail sections */
.detail-section{margin-bottom:24px;}
.detail-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.detail-section-title i{font-size:11px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.detail-item{background:#f9fafb;border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.detail-item.full{grid-column:1/-1;}
.detail-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;}
.detail-value{font-size:14px;font-weight:600;color:var(--text);word-break:break-all;}
.detail-value.mono{font-family:'DM Mono',monospace;font-size:13px;}
.detail-value.amount{font-family:'Sora',sans-serif;font-size:18px;font-weight:800;color:var(--green-dark);}
.detail-value.reward{font-family:'Sora',sans-serif;font-size:18px;font-weight:800;color:#1d4ed8;}
.detail-value.balance-positive{font-family:'Sora',sans-serif;font-size:16px;font-weight:800;color:var(--green-dark);}
.detail-value.balance-zero{font-family:'Sora',sans-serif;font-size:16px;font-weight:800;color:#d97706;}
.detail-value.balance-negative{font-family:'Sora',sans-serif;font-size:16px;font-weight:800;color:#dc2626;}

/* Balance loading skeleton */
.balance-skeleton{height:22px;width:80px;background:linear-gradient(90deg,#f3f4f6 25%,#e5e7eb 50%,#f3f4f6 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:6px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.proof-img-wrap{border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-top:4px;cursor:pointer;position:relative;}
.proof-img-wrap img{width:100%;display:block;max-height:260px;object-fit:cover;}
.proof-img-wrap .img-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;transition:background .2s;}
.proof-img-wrap:hover .img-overlay{background:rgba(0,0,0,0.3);}
.proof-img-wrap .img-overlay i{color:#fff;font-size:24px;opacity:0;transition:opacity .2s;}
.proof-img-wrap:hover .img-overlay i{opacity:1;}

.drawer-actions{padding:20px 24px;border-top:1px solid var(--border);display:flex;gap:10px;position:sticky;bottom:0;background:#fff;}
.drawer-btn-approve{flex:1;background:var(--green);color:#fff;border:none;border-radius:10px;padding:12px;font-family:'Sora',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.drawer-btn-approve:hover{background:var(--green-dark);}
.drawer-btn-reject{flex:1;background:#ef4444;color:#fff;border:none;border-radius:10px;padding:12px;font-family:'Sora',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.drawer-btn-reject:hover{background:#dc2626;}
.drawer-status-done{flex:1;background:#f3f4f6;border:1px solid var(--border);border-radius:10px;padding:12px;font-family:'Sora',sans-serif;font-weight:700;font-size:14px;color:var(--muted);text-align:center;}

/* IMAGE FULLSCREEN */
.img-modal{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:none;align-items:center;justify-content:center;z-index:500;}
.img-modal.open{display:flex;}
.img-modal img{max-width:90vw;max-height:88vh;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.4);}
.img-modal .close-btn{position:absolute;top:20px;right:20px;background:#fff;border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* MOBILE */
.hamburger{display:none;background:none;border:1px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer;color:var(--text);font-size:16px;}
.mobile-cards{display:none;flex-direction:column;gap:0;}
.m-card{padding:16px 20px;border-bottom:1px solid #f3f4f6;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.m-card:last-child{border-bottom:none;}
.m-card:hover{background:#fafafa;}
.m-card:active{background:#f3f4f6;}
.m-card-left{flex:1;min-width:0;}
.m-card-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.m-card-sub{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.m-card-token{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:3px;}
.m-card-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.m-card-amount{font-family:'Sora',sans-serif;font-size:15px;font-weight:800;color:var(--text);}
.m-card-chevron{color:#d1d5db;font-size:12px;}

.mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);z-index:150;padding:8px 0 max(8px, env(safe-area-inset-bottom));box-shadow:0 -4px 16px rgba(0,0,0,0.06);}
.mobile-bottom-nav .nav-items{display:flex;justify-content:space-around;}
.mobile-bottom-nav .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 16px;border-radius:10px;cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;transition:all .15s;min-width:70px;}
.mobile-bottom-nav .nav-item i{font-size:18px;color:var(--muted);}
.mobile-bottom-nav .nav-item span{font-size:10px;font-weight:600;color:var(--muted);}
.mobile-bottom-nav .nav-item.active i,.mobile-bottom-nav .nav-item.active span{color:var(--green-dark);}

@media(max-width:1024px){
  .stats-grid{grid-template-columns:1fr 1fr;}
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .hamburger{display:flex;align-items:center;}
  .recent-grid{grid-template-columns:1fr;}
  .drawer{width:100vw;}
}
@media(max-width:640px){
  body{padding-bottom:72px;}
  .content{padding:14px;}
  .top-bar{padding:12px 16px;}
  .top-bar h1{font-size:17px;}
  .hamburger{display:none !important;}
  .stats-grid{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .stat-card{padding:14px;}
  .stat-card .sc-val{font-size:22px;}
  .stat-card .sc-label{font-size:12px;}
  .stat-card .sc-icon{width:32px;height:32px;margin-bottom:8px;}
  .section-tabs{width:100%;overflow-x:auto;}
  .table-head{padding:14px 16px;}
  .search-box{display:none;}
  .detail-grid{grid-template-columns:1fr;}
  .drawer-body{padding:16px;}
  .drawer-header{padding:16px 20px;}
  .drawer-actions{padding:14px 16px;}
  .table-scroll{display:none;}
  .mobile-cards{display:flex;}
  .mobile-bottom-nav{display:block;}
  .toast{bottom:80px;right:16px;left:16px;text-align:center;}
  .recent-grid{grid-template-columns:1fr;}
  .recent-card{padding:16px;}
}
@media(max-width:380px){
  .stats-grid{grid-template-columns:1fr 1fr;}
  .stat-card .sc-val{font-size:18px;}
}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-icon"><i class="fa-solid fa-shield-halved" style="color:#fff;font-size:14px;"></i></div>
    <span class="sb-logo-text">Admin Panel</span>
  </div>
  <div class="sb-nav">
    <button class="sb-item active" onclick="showSection('overview',this)"><i class="fa-solid fa-gauge"></i> Overview</button>
    <button class="sb-item" onclick="showSection('deposits',this)"><i class="fa-solid fa-arrow-down-to-line"></i> Deposits</button>
    <button class="sb-item" onclick="showSection('withdrawals',this)"><i class="fa-solid fa-arrow-up-from-line"></i> Withdrawals</button>
  </div>
  <div class="sb-footer">
    <div class="sb-admin">
      <div class="sb-avatar" id="admin-avatar">A</div>
      <span class="sb-name" id="admin-name">Admin</span>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button>
  </div>
</aside>

<div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:99;" onclick="closeSidebar()"></div>

<nav class="mobile-bottom-nav">
  <div class="nav-items">
    <button class="nav-item active" id="mbnav-overview" onclick="showSection('overview',document.querySelector('.sb-item'));mobileNavActive('overview')">
      <i class="fa-solid fa-gauge"></i><span>Overview</span>
    </button>
    <button class="nav-item" id="mbnav-deposits" onclick="showSection('deposits',document.querySelectorAll('.sb-item')[1]);mobileNavActive('deposits')">
      <i class="fa-solid fa-arrow-down-to-line"></i><span>Deposits</span>
    </button>
    <button class="nav-item" id="mbnav-withdrawals" onclick="showSection('withdrawals',document.querySelectorAll('.sb-item')[2]);mobileNavActive('withdrawals')">
      <i class="fa-solid fa-arrow-up-from-line"></i><span>Withdrawals</span>
    </button>
  </div>
</nav>

<main class="main">
  <div class="top-bar">
    <div style="display:flex;align-items:center;gap:14px;">
      <button class="hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
      <h1 id="page-title">Overview</h1>
    </div>
    <span class="top-badge"><i class="fa-solid fa-shield-halved"></i> Admin</span>
  </div>
  <div class="content">

    <!-- OVERVIEW -->
    <div id="sec-overview">
      <div class="stats-grid">
        <div class="stat-card yellow">
          <div class="sc-icon"><i class="fa-solid fa-hourglass-half" style="color:#a16207;font-size:16px;"></i></div>
          <div class="sc-val" id="stat-pending-dep">—</div>
          <div class="sc-label">Pending Deposits</div>
        </div>
        <div class="stat-card green">
          <div class="sc-icon"><i class="fa-solid fa-circle-check" style="color:var(--green-dark);font-size:16px;"></i></div>
          <div class="sc-val" id="stat-approved-dep">—</div>
          <div class="sc-label">Approved Deposits</div>
        </div>
        <div class="stat-card blue">
          <div class="sc-icon"><i class="fa-solid fa-clock" style="color:#1d4ed8;font-size:16px;"></i></div>
          <div class="sc-val" id="stat-pending-wit">—</div>
          <div class="sc-label">Pending Withdrawals</div>
        </div>
        <div class="stat-card red">
          <div class="sc-icon"><i class="fa-solid fa-circle-xmark" style="color:#dc2626;font-size:16px;"></i></div>
          <div class="sc-val" id="stat-rejected">—</div>
          <div class="sc-label">Rejected (Total)</div>
        </div>
      </div>
      <div class="recent-grid">
        <div class="recent-card">
          <h3 class="green"><i class="fa-solid fa-arrow-down" style="margin-right:8px;"></i>Recent Deposits</h3>
          <div id="recent-deposits-list"><div class="loading"><i class="fa-solid fa-circle-notch fa-spin"></i></div></div>
        </div>
        <div class="recent-card">
          <h3 class="blue"><i class="fa-solid fa-arrow-up" style="margin-right:8px;"></i>Recent Withdrawals</h3>
          <div id="recent-withdrawals-list"><div class="loading"><i class="fa-solid fa-circle-notch fa-spin"></i></div></div>
        </div>
      </div>
    </div>

    <!-- DEPOSITS -->
    <div id="sec-deposits" style="display:none;">
      <div class="section-tabs">
        <button class="stab active" onclick="filterDep('ALL',this)">All</button>
        <button class="stab" onclick="filterDep('PENDING',this)">Pending</button>
        <button class="stab" onclick="filterDep('APPROVED',this)">Approved</button>
        <button class="stab" onclick="filterDep('REJECTED',this)">Rejected</button>
      </div>
      <div class="table-card">
        <div class="table-head">
          <h2>Deposits</h2>

<!-- DRAWER -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="detail-drawer">
  <div class="drawer-header">
    <h2 id="drawer-title">Transaction Details</h2>

<!-- Fullscreen image -->
<div class="img-modal" id="img-modal" onclick="closeImgModal()">

</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://kowriwebbackend.onrender.com';
let allDeposits = [], allWithdrawals = [];
let depFilter = 'ALL', depSearch = '';
let witFilter = 'ALL', witSearch = '';

/* ── AUTH ── */
function logout() {
  ['kowri_admin_token','kowri_admin','kowri_admin_refresh','kowri_token','kowri_user'].forEach(k => localStorage.removeItem(k));
  location.href = '../signin.html';
}

/* ── SIDEBAR ── */
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');
  sb.classList.toggle('open');
  ov.style.display = sb.classList.contains('open') ? 'block' : 'none';
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').style.display = 'none';
}

/* ── TOAST ── */
function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => { t.className = 'toast'; }, 3000);
}

/* ── FORMATTERS ── */
function fmt(amt)   { return 'GH₵ ' + parseFloat(amt||0).toLocaleString('en-GH', {minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d) { return new Date(d).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function initials(name){ return (name||'?').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2); }

/* ── Balance display helper ── */
function balanceClass(val) {
  if (val > 0) return 'balance-positive';
  if (val < 0) return 'balance-negative';
  return 'balance-zero';
}
function balanceLabel(val) {
  if (val < 0) return `<span style="font-size:10px;background:#fee2e2;color:#991b1b;padding:2px 7px;border-radius:5px;margin-left:6px;font-weight:700;">NEGATIVE</span>`;
  return '';
}

/* ── SECTIONS ── */
function showSection(name, el) {
  ['overview','deposits','withdrawals'].forEach(s => document.getElementById('sec-'+s).style.display = 'none');
  document.getElementById('sec-'+name).style.display = 'block';
  document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('page-title').textContent = name.charAt(0).toUpperCase()+name.slice(1);
  closeSidebar();
}
function mobileNavActive(name) {
  ['overview','deposits','withdrawals'].forEach(n => {
    const el = document.getElementById('mbnav-'+n);
    if (el) el.classList.toggle('active', n === name);
  });
}

/* ── FILTER / SEARCH ── */
function filterDep(status, el) {
  depFilter = status;
  el.closest('.section-tabs').querySelectorAll('.stab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderDep();
}
function filterWit(status, el) {
  witFilter = status;
  el.closest('.section-tabs').querySelectorAll('.stab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderWit();
}
function searchDep(q) { depSearch = q.toLowerCase(); renderDep(); }
function searchWit(q) { witSearch = q.toLowerCase(); renderWit(); }

/* ── RENDER DEPOSITS TABLE ── */
function renderDep() {
  let items = allDeposits;
  if (depFilter !== 'ALL') items = items.filter(d => d.status === depFilter);
  if (depSearch) items = items.filter(d =>
    (d.tokenId||'').toLowerCase().includes(depSearch) ||
    (d.walletId||'').toLowerCase().includes(depSearch) ||
    (d.userFullName||'').toLowerCase().includes(depSearch) ||
    (d.userEmail||'').toLowerCase().includes(depSearch) ||
    (d.amount+'').includes(depSearch)
  );
  const wrap = document.getElementById('dep-table-wrap');
  if (!items.length) { wrap.innerHTML = '<div class="empty">No deposits found.</div>'; renderDepMobile([]); return; }
  wrap.innerHTML = `<table>
    <thead><tr>
      <th>Date</th><th>User</th><th>Current Balance</th><th>Token ID</th><th>Amount</th><th>Reward</th><th>Status</th><th>Actions</th>
    </tr></thead>
    <tbody>
    ${items.map(d => {
      const bal = parseFloat(d.userBalance||0);
      const balCls = bal > 0 ? 'color:var(--green-dark)' : bal < 0 ? 'color:#dc2626' : 'color:#d97706';
      return `<tr>
        <td style="white-space:nowrap;color:var(--muted);font-size:12px;">${fmtDate(d.createdAt)}</td>
        <td>
          <div style="font-weight:600;font-size:13px;">${d.userFullName||'—'}</div>
          <div style="font-size:11px;color:var(--muted);">${d.userEmail||''}</div>
        </td>
        <td>
          <span style="font-family:'Sora',sans-serif;font-weight:700;font-size:13px;${balCls};">${fmt(d.userBalance)}</span>
          ${bal < 0 ? '<br><span style="font-size:10px;background:#fee2e2;color:#991b1b;padding:1px 6px;border-radius:4px;font-weight:700;">NEGATIVE</span>' : ''}
        </td>
        <td><span style="font-family:'DM Mono',monospace;font-size:12px;background:#f3f4f6;padding:2px 7px;border-radius:5px;">${d.tokenId||'—'}</span></td>
        <td style="font-family:'Sora',sans-serif;font-weight:700;">${fmt(d.amount)}</td>
        <td style="font-family:'Sora',sans-serif;font-weight:700;color:#1d4ed8;">${fmt(d.rewardAmount)}</td>
        <td><span class="badge ${d.status}">${d.status}</span></td>
        <td>
          <div class="action-btns">
            <button class="btn-details" onclick="openDepositDrawer('${d.id}')"><i class="fa-solid fa-eye"></i> Details</button>
            ${d.status === 'PENDING' ? `
              <button class="btn-approve" onclick="updateDep('${d.id}','APPROVED')"><i class="fa-solid fa-check"></i></button>
              <button class="btn-reject"  onclick="updateDep('${d.id}','REJECTED')"><i class="fa-solid fa-xmark"></i></button>
            ` : ''}
          </div>
        </td>
      </tr>`;
    }).join('')}
    </tbody></table>`;
  renderDepMobile(items);
}

function renderDepMobile(items) {
  const mwrap = document.getElementById('dep-mobile-wrap');
  mwrap.innerHTML = items.length ? items.map(d => `
    <div class="m-card" onclick="openDepositDrawer('${d.id}')">
      <div class="m-card-left">
        <div class="m-card-name">${d.userFullName||'Unknown User'}</div>
        <div class="m-card-sub">${d.userEmail||'—'}</div>
        <div class="m-card-token">${d.tokenId||'No token'} · ${fmtDate(d.createdAt)}</div>
      </div>
      <div class="m-card-right">
        <div class="m-card-amount">${fmt(d.amount)}</div>
        <span class="badge ${d.status}">${d.status}</span>
        <i class="fa-solid fa-chevron-right m-card-chevron"></i>
      </div>
    </div>`).join('') : '<div class="empty">No deposits found.</div>';
}

/* ── RENDER WITHDRAWALS TABLE ── */
function renderWit() {
  let items = allWithdrawals;
  if (witFilter !== 'ALL') items = items.filter(w => w.status === witFilter);
  if (witSearch) items = items.filter(w =>

    (w.accountNumber||'').toLowerCase().includes(witSearch) ||
    (w.networkProvider||'').toLowerCase().includes(witSearch) ||
    (w.userFullName||'').toLowerCase().includes(witSearch) ||
    (w.userEmail||'').toLowerCase().includes(witSearch) ||
    (w.amount+'').includes(witSearch)

  const wrap = document.getElementById('wit-table-wrap');

  wrap.innerHTML = `<table>
    <thead><tr>
      <th>Date</th><th>User</th><th>Current Balance</th><th>Network</th><th>Account #</th><th>Amount</th><th>Status</th><th>Actions</th>
    </tr></thead>
    <tbody>
    ${items.map(w => {
      const bal = parseFloat(w.userBalance||0);
      const balCls = bal > 0 ? 'color:var(--green-dark)' : bal < 0 ? 'color:#dc2626' : 'color:#d97706';
      return `<tr>
        <td style="white-space:nowrap;color:var(--muted);font-size:12px;">${fmtDate(w.createdAt)}</td>
        <td>
          <div style="font-weight:600;font-size:13px;">${w.userFullName||w.accountName||'—'}</div>
          <div style="font-size:11px;color:var(--muted);">${w.userEmail||''}</div>
        </td>
        <td>
          <span style="font-family:'Sora',sans-serif;font-weight:700;font-size:13px;${balCls};">${fmt(w.userBalance)}</span>
          ${bal < 0 ? '<br><span style="font-size:10px;background:#fee2e2;color:#991b1b;padding:1px 6px;border-radius:4px;font-weight:700;">NEGATIVE</span>' : ''}
        </td>
        <td>${w.networkProvider||'—'}</td>
        <td style="font-family:'DM Mono',monospace;font-size:12px;">${w.accountNumber||'—'}</td>
        <td style="font-family:'Sora',sans-serif;font-weight:700;">${fmt(w.amount)}</td>
        <td><span class="badge ${w.status}">${w.status}</span></td>
        <td><div class="action-btns">
          ${w.status === 'PENDING' ? `
            <button class="btn-details" onclick="openWithdrawalDrawer('${w.id}')"><i class="fa-solid fa-eye"></i> Details</button>
            <button class="btn-approve" onclick="updateWit('${w.id}','APPROVED')"><i class="fa-solid fa-check"></i></button>
            <button class="btn-reject"  onclick="updateWit('${w.id}','REJECTED')"><i class="fa-solid fa-xmark"></i></button>
          ` : `<button class="btn-details" onclick="openWithdrawalDrawer('${w.id}')"><i class="fa-solid fa-eye"></i> Details</button>`}
        </div></td>
      </tr>`;
    }).join('')}
    </tbody></table>`;
  renderWitMobile(items);
}

function renderWitMobile(items) {
  const mwrap = document.getElementById('wit-mobile-wrap');
  mwrap.innerHTML = items.length ? items.map(w => `
    <div class="m-card" onclick="openWithdrawalDrawer('${w.id}')">
      <div class="m-card-left">
        <div class="m-card-name">${w.userFullName||w.accountName||'—'}</div>
        <div class="m-card-sub">${w.networkProvider||'—'} · ${w.accountNumber||'—'}</div>
        <div class="m-card-token">${fmtDate(w.createdAt)}</div>
      </div>
      <div class="m-card-right">
        <div class="m-card-amount">${fmt(w.amount)}</div>
        <span class="badge ${w.status}">${w.status}</span>
        <i class="fa-solid fa-chevron-right m-card-chevron"></i>
      </div>
    </div>`).join('') : '<div class="empty">No withdrawals found.</div>';
}

/* ── OVERVIEW ── */
function renderOverview() {
  document.getElementById('stat-pending-dep').textContent  = allDeposits.filter(d=>d.status==='PENDING').length;
  document.getElementById('stat-approved-dep').textContent = allDeposits.filter(d=>d.status==='APPROVED').length;
  document.getElementById('stat-pending-wit').textContent  = allWithdrawals.filter(w=>w.status==='PENDING').length;
  document.getElementById('stat-rejected').textContent     = allDeposits.filter(d=>d.status==='REJECTED').length + allWithdrawals.filter(w=>w.status==='REJECTED').length;

  const recentDep = [...allDeposits].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,5);
  const recentWit = [...allWithdrawals].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,5);

  document.getElementById('recent-deposits-list').innerHTML = recentDep.length
    ? recentDep.map(d=>`<div class="recent-row" onclick="openDepositDrawer('${d.id}')">
        <div>
          <div style="font-size:13px;font-weight:600;">${d.userFullName||d.tokenId||'—'}</div>
          <div style="font-size:11px;color:var(--muted);">${d.userEmail||''} · ${fmtDate(d.createdAt)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-family:'Sora',sans-serif;font-weight:700;font-size:13px;">${fmt(d.amount)}</span>
          <span class="badge ${d.status}" style="font-size:10px;">${d.status}</span>
        </div>
      </div>`).join('')
    : '<div style="color:var(--muted);font-size:13px;padding:8px 0;">No deposits yet.</div>';

  document.getElementById('recent-withdrawals-list').innerHTML = recentWit.length
    ? recentWit.map(w=>`<div class="recent-row" onclick="openWithdrawalDrawer('${w.id}')">
        <div>
          <div style="font-size:13px;font-weight:600;">${w.userFullName||w.accountName||'—'}</div>
          <div style="font-size:11px;color:var(--muted);">${w.networkProvider||''} · ${fmtDate(w.createdAt)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-family:'Sora',sans-serif;font-weight:700;font-size:13px;">${fmt(w.amount)}</span>
          <span class="badge ${w.status}" style="font-size:10px;">${w.status}</span>
        </div>
      </div>`).join('')
    : '<div style="color:var(--muted);font-size:13px;padding:8px 0;">No withdrawals yet.</div>';
}

/* ── FETCH LIVE USER BALANCE ── */
async function fetchLiveBalance(userId) {
  if (!userId) return null;
  const token = localStorage.getItem('kowri_admin_token');
  try {
    const res = await fetch(`${API}/api/admin/users/${userId}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (!res.ok) return null;
    const data = await res.json();
    return parseFloat(data.balance ?? data.userBalance ?? 0);
  } catch { return null; }
}

/* ── DEPOSIT DETAIL DRAWER ── */
async function openDepositDrawer(id) {
  const d = allDeposits.find(x => x.id === id);
  if (!d) return;

  document.getElementById('drawer-title').textContent = 'Deposit Details';
  const body = document.getElementById('drawer-body');

  // Render immediately with cached balance, then refresh live
  renderDepositDrawerBody(d, parseFloat(d.userBalance||0));
  openDrawerPanel();
  setDrawerActions('deposit', d);

  // Fetch live balance and update
  const live = await fetchLiveBalance(d.userId);
  if (live !== null) {
    d.userBalance = live; // update cache
    const el = document.getElementById('drawer-live-balance');
    if (el) {
      el.className = 'detail-value ' + balanceClass(live);
      el.innerHTML = fmt(live) + balanceLabel(live);
    }
  }
}

          <div class="detail-label">Amount</div>
          <div class="detail-value amount">${fmt(w.amount)}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Network</div>
          <div class="detail-value">${w.networkProvider||'—'}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Account Name</div>
          <div class="detail-value">${w.accountName||'—'}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Account Number</div>
          <div class="detail-value mono">${w.accountNumber||'—'}</div>
        </div>
        <div class="detail-item full">
          <div class="detail-label">Agent Service</div>
          <div class="detail-value">${w.agentService||'—'}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Submitted</div>
          <div class="detail-value" style="font-size:12px;">${fmtDate(w.createdAt)}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Transaction ID</div>
          <div class="detail-value mono" style="font-size:11px;">${w.id||'—'}</div>
        </div>
      </div>
    </div>
  `;
}

/* ── DRAWER HELPERS ── */
function openDrawerPanel() {
  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('detail-drawer').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('detail-drawer').classList.remove('open');
  document.body.style.overflow = '';
}

function setDrawerActions(type, item) {
  const actions = document.getElementById('drawer-actions');
  if (item.status === 'PENDING') {
    const approveFn = type === 'deposit'
      ? `updateDep('${item.id}','APPROVED')`
      : `updateWit('${item.id}','APPROVED')`;
    const rejectFn = type === 'deposit'
      ? `updateDep('${item.id}','REJECTED')`
      : `updateWit('${item.id}','REJECTED')`;
    actions.innerHTML = `
      <button class="drawer-btn-approve" onclick="${approveFn};closeDrawer()">
        <i class="fa-solid fa-check"></i> Approve
      </button>
      <button class="drawer-btn-reject" onclick="${rejectFn};closeDrawer()">
        <i class="fa-solid fa-xmark"></i> Reject
      </button>`;
  } else {
    actions.innerHTML = `<div class="drawer-status-done"><i class="fa-solid fa-circle-check"></i> Already ${item.status}</div>`;
  }
}

/* ── API: UPDATE DEPOSIT ── */
async function updateDep(id, status) {
  const token = localStorage.getItem('kowri_admin_token');
  try {
    const res = await fetch(`${API}/api/admin/deposits/${id}/status?status=${status}`, {
      method: 'PATCH',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (!res.ok) throw new Error('Failed');
    const idx = allDeposits.findIndex(d => d.id === id);
    if (idx > -1) allDeposits[idx].status = status;
    renderDep();
    renderOverview();
    toast(`Deposit ${status.toLowerCase()} successfully`, status === 'APPROVED' ? 'success' : 'error');
  } catch(e) {
    toast('Action failed: ' + e.message, 'error');
  }
}

/* ── API: UPDATE WITHDRAWAL ── */
async function updateWit(id, status) {
  const token = localStorage.getItem('kowri_admin_token');
  try {
    const res = await fetch(`${API}/api/admin/withdrawals/${id}/status?status=${status}`, {
      method: 'PATCH',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (!res.ok) throw new Error('Failed');
    const idx = allWithdrawals.findIndex(w => w.id === id);
    if (idx > -1) allWithdrawals[idx].status = status;
    renderWit();
    renderOverview();
    toast(`Withdrawal ${status.toLowerCase()} successfully`, status === 'APPROVED' ? 'success' : 'error');
  } catch(e) {
    toast('Action failed: ' + e.message, 'error');
  }
}

/* ── IMAGE FULLSCREEN ── */
function viewImg(url) {
  document.getElementById('modal-img').src = url;
  document.getElementById('img-modal').classList.add('open');
}
function closeImgModal() {
  document.getElementById('img-modal').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDrawer(); closeImgModal(); }
});

/* ── INIT ── */
async function init() {
  const stored = localStorage.getItem('kowri_admin');
  const token  = localStorage.getItem('kowri_admin_token');
  if (!stored || !token) { location.href = '../signin.html'; return; }

  const admin = JSON.parse(stored);
  document.getElementById('admin-avatar').textContent = initials(admin.fullName || admin.email);
  document.getElementById('admin-name').textContent   = admin.fullName || admin.email;

  const headers = { 'Authorization': `Bearer ${token}` };
  try {
    const [dRes, wRes] = await Promise.all([
      fetch(`${API}/api/admin/deposits`,    { headers }),
      fetch(`${API}/api/admin/withdrawals`, { headers })
    ]);
    allDeposits    = dRes.ok ? await dRes.json() : [];
    allWithdrawals = wRes.ok ? await wRes.json() : [];
  } catch(e) {
    allDeposits = []; allWithdrawals = [];
    toast('Failed to load data. Check connection.', 'error');
  }

  renderOverview();
  renderDep();
  renderWit();
}

init();
</script>
</body>
</html>
