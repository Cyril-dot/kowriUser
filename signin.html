<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kowri – Login</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
:root{
  --green:#22c55e;
  --green-dark:#16a34a;
  --text:#111827;
  --muted:#6b7280;
  --border:#d1d5db;
  --bg:#f3f4f6;
  --card:#ffffff;
  --error-bg:#fef2f2;
  --error-border:#f87171;
  --error-text:#b91c1c;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{
  font-family:'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.logo-area{
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 36px;
}
.logo-area img{
  height: 44px;
  width: auto;
  display: block;
}
.logo-area .logo-fallback{
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-wordmark{
  font-family: 'Sora', sans-serif;
  font-weight: 800;
  font-size: 28px;
  color: var(--text);
  letter-spacing: -0.03em;
}
.auth-box{
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 48px 44px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
h2{
  font-family: 'Sora', sans-serif;
  font-size: 26px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 8px;
  letter-spacing: -0.02em;
}
.sub{
  font-size: 16px;
  color: var(--muted);
  margin-bottom: 36px;
}
.field{
  margin-bottom: 28px;
}
.field label{
  display: block;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 10px;
}
.field input{
  width: 100%;
  padding: 14px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  color: var(--text);
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  outline: none;
  transition: border-color 0.15s;
}
.field input:focus{
  border-color: var(--green);
}
.field input::placeholder{ color: #9ca3af; }
.field-row{
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.field-row label{ margin-bottom: 0; }
.forgot-link{
  font-size: 14px;
  color: var(--green-dark);
  text-decoration: none;
  font-weight: 500;
}
.forgot-link:hover{ text-decoration: underline; }
.remember-row{
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
}
.remember-row input[type=checkbox]{
  width: 18px;
  height: 18px;
  accent-color: var(--green);
  cursor: pointer;
}
.remember-row label{
  font-size: 15px;
  color: var(--muted);
  cursor: pointer;
}
.btn-submit{
  width: 100%;
  background: #1f2937;
  color: #fff;
  font-family: 'Sora', sans-serif;
  font-weight: 700;
  font-size: 16px;
  padding: 15px 20px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.2s;
  letter-spacing: 0.04em;
}
.btn-submit:hover{ background: #111827; }
.btn-submit:disabled{ opacity: 0.6; cursor: not-allowed; }
.foot{
  text-align: center;
  margin-top: 28px;
  font-size: 15px;
  color: var(--muted);
}
.foot a{
  color: var(--green-dark);
  text-decoration: none;
  font-weight: 600;
}
.foot a:hover{ text-decoration: underline; }
.error{
  background: var(--error-bg);
  border: 1px solid var(--error-border);
  border-radius: 4px;
  padding: 14px 16px;
  font-size: 14px;
  color: var(--error-text);
  margin-bottom: 24px;
  display: none;
  font-weight: 500;
}
.spinner{
  display: inline-block;
  width: 17px; height: 17px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}
@keyframes spin{ to{ transform: rotate(360deg); } }
@media(max-width: 560px){
  .auth-box{ padding: 32px 24px; }
}
input:-webkit-autofill,
input:-webkit-autofill:focus {
  transition: background-color 0s 600000s, color 0s 600000s;
  -webkit-text-fill-color: var(--text);
}
</style>
</head>
<body>

<div class="logo-area">
  <img src="07d3a4e2-8cf5-43b7-8c90-df4419da67de.jfif" alt="Kowri"
    onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'"/>
  <div class="logo-fallback" style="display:none;">
    <svg width="40" height="40" viewBox="0 0 36 36" fill="none">
      <defs>
        <radialGradient id="lg" cx="40%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#4ade80"/>
          <stop offset="100%" stop-color="#16a34a"/>
        </radialGradient>
      </defs>
      <path d="M18 2C18 2 4 10 4 21C4 28.7 10.3 35 18 35C25.7 35 32 28.7 32 21C32 10 18 2 18 2Z" fill="url(#lg)"/>
      <path d="M18 8C15 14 12 18 12 22C12 26 14.5 29.5 18 31.5C14 28.5 13 25 14 21C15.5 16 18 8 18 8Z" fill="white" opacity="0.28"/>
    </svg>
    <span class="logo-wordmark">kowri</span>
  </div>
</div>

<div class="auth-box">
  <h2>Welcome back</h2>
  <p class="sub">Sign in to your Kowri account</p>

  <div class="error" id="err-box"></div>

  <div class="field">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Enter your email" autocomplete="email"/>
  </div>

  <div class="field">
    <div class="field-row">
      <label for="password">Password</label>
      <a href="#" class="forgot-link">Forgot your password?</a>
    </div>
    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
  </div>

  <div class="remember-row">
    <input type="checkbox" id="remember"/>
    <label for="remember">Remember me</label>
  </div>

  <button class="btn-submit" id="si-btn" onclick="doSignIn()">LOG IN</button>

  <div class="foot">Don't have an account? <a href="signup.html">Register</a></div>
</div>

<script>
const API = 'https://kowriwebbackend.onrender.com';
const ADMIN_EMAILS = ['annorsolomon1@gmail.com'];

function isAdminEmail(email) {
  return ADMIN_EMAILS.some(a => a.toLowerCase() === email.toLowerCase());
}

async function doSignIn() {
  const btn = document.getElementById('si-btn');
  const errBox = document.getElementById('err-box');
  errBox.style.display = 'none';

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) {
    errBox.textContent = 'Please enter your email and password to continue.';
    errBox.style.display = 'block';
    return;
  }
  if (!email.includes('@')) {
    errBox.textContent = 'Please enter a valid email address.';
    errBox.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in...';

  try {
    if (isAdminEmail(email)) {
      const res = await fetch(`${API}/api/admin/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Invalid admin credentials');
      localStorage.setItem('kowri_admin_token', data.token);
      localStorage.setItem('kowri_admin_refresh', data.refreshToken);
      localStorage.setItem('kowri_admin', JSON.stringify({ id: data.adminId || data.userId || data.id, fullName: data.fullName, email: data.email, role: data.role || 'admin' }));
      localStorage.setItem('kowri_token', data.token);
      localStorage.setItem('kowri_user', JSON.stringify(data));
      location.href = 'admin/admin-dashboard.html';
    } else {
      const res = await fetch(`${API}/api/users/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Invalid email or password');
      localStorage.setItem('kowri_token', data.token);
      localStorage.setItem('kowri_refresh', data.refreshToken);
      localStorage.setItem('kowri_user', JSON.stringify(data));
      location.href = 'dashboard.html';
    }
  } catch(e) {
    errBox.textContent = e.message || 'Connection issue. Please try again.';
    errBox.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'LOG IN';
  }
}

document.addEventListener('keydown', e => { if(e.key === 'Enter') doSignIn(); });
window.addEventListener('load', () => { document.getElementById('email').focus(); });
</script>
</body>
</html>
